<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8E6EFF"/>
      <stop offset="55%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#4B3199"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EAE4FF"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

  <rect x="0" y="0" width="1024" height="560" fill="url(#gloss)"/>

  <g transform="translate(512 540)" fill="url(#mono)">
    <path d="
      M -260 -220
      L -140 -220
      L 0 40
      L 140 -220
      L 260 -220
      L 260 220
      L 150 220
      L 150 -40
      L 40 170
      L -40 170
      L -150 -40
      L -150 220
      L -260 220
      Z"
      stroke="#FFFFFF" stroke-width="0" stroke-linejoin="round"/>
  </g>

  <circle cx="512" cy="900" r="8" fill="#FFFFFF" opacity="0.9"/>
</svg>
